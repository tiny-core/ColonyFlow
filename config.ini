[core]
; Intervalo do loop principal do scheduler (segundos).
poll_interval_seconds=2
; Intervalo de refresh da UI (segundos). Ainda não é o foco da Phase 2, mas já fica configurado.
ui_refresh_seconds=1
; Nível de log: DEBUG, INFO, WARN, ERROR
log_level=INFO
; Pasta onde os logs serão gravados (relativa à raiz do computador).
log_dir=logs
; Quantidade máxima de arquivos de log mantidos (rotação).
log_max_files=10
; Tamanho máximo por log em KB antes de rotacionar.
log_max_kb=256

[peripherals]
; Nomes dos periféricos como aparecem no `peripheral.getNames()`.
colony_integrator=colony_integrator_2
; Usado a partir da Phase 3 (craft/entrega). A Phase 2 não depende do ME.
me_bridge=me_bridge_2
modem=modem_0
monitor_requests=monitor_0
monitor_status=monitor_1

[minecolonies]
; Lista (separada por vírgula) de states que devem ser tratados como "pendente".
; Exemplo: pending_states_allow=requested,in_progress
; Se ficar vazio, o sistema processa qualquer state que NÃO esteja em completed_states_deny.
pending_states_allow=
; Lista (separada por vírgula) de states que devem ser tratados como "concluído" (não processar).
completed_states_deny=done,completed,fulfilled,success

[delivery]
; Inventário(s) de destino preferidos para validar faltante.
; Pode ser um único nome: default_target_container=chest_1
; Ou uma lista: default_target_container=minecolonies:rack_0,chest_1,barrel_0
; O sistema usa o primeiro periférico que existir (na ordem).
default_target_container=minecolonies:rack_0
; Como exportar itens do ME Bridge para o destino:
; - auto: tenta via rede (exportItemToPeripheral) se existir; senão cai para buffer/direction
; - peripheral: força exportItemToPeripheral (exige que o ME Bridge exponha o método)
; - direction: força exportItem(direction) (inventário precisa estar encostado no ME Bridge)
; - buffer: exporta por direction para um buffer encostado no ME Bridge e depois move do buffer -> default_target_container via pushItems (rede CC:Tweaked)
export_mode=auto
; Direção usada para exportItem(...) quando export_mode=direction ou buffer.
export_direction=up
; Nome do inventário buffer (peripheral name) quando export_mode=buffer ou quando auto cair para buffer.
export_buffer_container=minecolonies:rack_1
; TTL do cache do snapshot do inventário do destino (segundos). Evita revarrer slots a cada tick.
destination_cache_ttl_seconds=2

[substitution]
; Modo de substituição (ainda sem craft/entrega na Phase 2):
; - safe: nunca escolhe item fora de accepted[] (sempre).
mode=safe
; Quando múltiplos itens são aceitos pela request, preferir vanilla (minecraft:) primeiro.
vanilla_first=true
; Se false: itens de mod só são elegíveis se estiverem no data/mappings.json (allowlist via DB).
; Se true: permite itens de mod mesmo sem mapeamento no DB.
allow_unmapped_mods=false
; Preferência de tier ao escolher entre itens aceitos:
; - lowest: prefere o tier mais baixo
; - highest: prefere o tier mais alto
tier_preference=highest

[tiers]
; Tiers padrão usados como fallback quando não for possível inferir.
default_tool_tier=wood
default_armor_tier=leather
; Tiers máximos globais (gating por building/worker é Phase 3; aqui só influencia ordenação/heurística).
max_tool_tier=netherite
max_armor_tier=netherite

[cache]
; Limite global de entradas no cache TTL.
max_entries=2000
; TTL padrão do cache (segundos).
default_ttl_seconds=5

[progression]
; Mantido para Phase 3 (tier gating real por building/worker). Phase 2 não aplica gating efetivo.
enforce_building_gating=true
